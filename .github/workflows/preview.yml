name: PR Preview

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-pr-${{ github.event.number }}
          path: dist/
          retention-days: 7

      - name: Post preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.issue.number;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## Preview build ready',
              '',
              `Build succeeded for this PR. Download the artifact from the [Actions run](${runUrl}) to test locally:`,
              '',
              '```',
              '# After downloading and unzipping preview-pr-' + pr + '.zip:',
              'npx serve dist',
              '```',
              '',
              '_Artifact expires after 7 days. Updates on every push._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: pr,
            });

            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Preview build ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: pr,
                body,
              });
            }
