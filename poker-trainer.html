<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Texas Hold'em Poker Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --felt:#0c2416;--felt-mid:#173527;--felt-rim:#1e4733;
  --gold:#c9a84c;--gold-bright:#edd97a;--gold-dark:#7a5e1a;
  --card-bg:#f9f5ea;--red:#c0392b;--black:#1a1a2a;
  --text:#f0e8d0;--muted:#8a7a5a;--accent:#2ecc71
}
body{
  background:var(--felt);
  background-image:radial-gradient(ellipse 80% 40% at 50% 0%,#1e4a2e,transparent),
    url("data:image/svg+xml,%3Csvg width='8' height='8' viewBox='0 0 8 8' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='4' cy='4' r='0.8' fill='%23ffffff' fill-opacity='0.025'/%3E%3C/svg%3E");
  min-height:100vh;font-family:'Crimson Pro',Georgia,serif;
  color:var(--text);padding-bottom:4rem;overflow-x:hidden
}

/* ── Header ── */
header{
  text-align:center;padding:2.5rem 1rem 1.5rem;
  border-bottom:1px solid rgba(201,168,76,0.3);
  background:linear-gradient(180deg,rgba(0,0,0,0.35) 0%,transparent 100%)
}
.suits-row{font-size:2rem;letter-spacing:0.6rem;margin-bottom:0.8rem;
  animation:suitFade 3s ease-in-out infinite alternate}
@keyframes suitFade{from{opacity:.5}to{opacity:1}}
.suits-row .s,.suits-row .c{color:#f0e8d0}
.suits-row .h,.suits-row .d{color:#c0392b}
h1{font-family:'Playfair Display',Georgia,serif;font-size:clamp(1.8rem,5vw,3rem);
  color:var(--gold-bright);letter-spacing:0.05em;line-height:1.1}
h1 em{font-style:italic;color:var(--gold)}
.subtitle{color:var(--muted);font-size:1.05rem;margin-top:0.4rem}

/* ── Tabs ── */
nav{display:flex;justify-content:center;gap:0;margin:1.5rem auto 0;max-width:480px;
  border:1px solid var(--gold-dark);border-radius:40px;overflow:hidden;background:rgba(0,0,0,0.3)}
nav button{flex:1;padding:0.6rem 1rem;border:none;background:transparent;
  color:var(--muted);font-family:'Crimson Pro',serif;font-size:1rem;cursor:pointer;
  transition:all .25s;letter-spacing:.04em}
nav button.active{background:var(--gold-dark);color:var(--gold-bright);font-weight:600}
nav button:hover:not(.active){color:var(--text);background:rgba(255,255,255,0.07)}

/* ── Filter chips ── */
.filters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  padding:1.2rem 1rem 0;max-width:900px;margin:0 auto}
.chip{padding:4px 14px;border-radius:20px;border:1px solid var(--gold-dark);
  background:transparent;color:var(--muted);font-size:.85rem;cursor:pointer;
  font-family:'Crimson Pro',serif;transition:all .2s}
.chip.on{background:var(--gold-dark);color:var(--gold-bright);border-color:var(--gold)}
.chip:hover:not(.on){border-color:var(--gold);color:var(--text)}

/* ── Progress bar ── */
.progress-wrap{max-width:600px;margin:1rem auto 0;padding:0 1rem}
.progress-bar{height:4px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));
  border-radius:4px;transition:width .4s ease}
.progress-label{display:flex;justify-content:space-between;font-size:.8rem;
  color:var(--muted);margin-top:4px}

/* ── Flashcard scene ── */
#study-panel{padding:1.5rem 1rem 0}
.scene{perspective:1200px;max-width:600px;margin:0 auto;height:380px}
.card-wrap{width:100%;height:100%;position:relative;transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,0,.2,1);cursor:pointer}
.card-wrap.flipped{transform:rotateY(180deg)}
.card-face,.card-back{position:absolute;inset:0;border-radius:16px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;overflow:hidden}

/* Card front (definition side) */
.card-face{background:var(--card-bg);color:var(--black);transform:rotateY(180deg)}
.card-face .cf-header{
  background:linear-gradient(135deg,#1a3a28,#0d2416);
  padding:1rem 1.2rem;color:var(--gold-bright)
}
.card-face .cf-cat{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);margin-bottom:2px}
.card-face .cf-term{font-family:'Playfair Display',serif;font-size:1.6rem;
  font-weight:700;line-height:1.2}
.card-face .cf-body{padding:1.2rem;flex:1;display:flex;flex-direction:column;gap:1rem}
.card-face .cf-def{font-size:1.1rem;line-height:1.6;color:#2a2016}
.card-face .illus{flex:1;display:flex;align-items:center;justify-content:center}

/* Card back (question side) */
.card-back{
  background:linear-gradient(135deg,#1e3d28 0%,#0c2010 100%);
  border:2px solid var(--gold-dark);
  align-items:center;justify-content:center;flex-direction:column;gap:1rem
}
.card-back .back-pattern{position:absolute;inset:0;opacity:.07;
  background-image:repeating-linear-gradient(45deg,#c9a84c 0,#c9a84c 1px,transparent 0,transparent 50%);
  background-size:16px 16px}
.card-back .term-cat{font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold);z-index:1}
.card-back .term-main{font-family:'Playfair Display',serif;
  font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;
  color:var(--gold-bright);text-align:center;padding:0 1.5rem;
  z-index:1;line-height:1.2;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.card-back .tap-hint{font-size:.85rem;color:var(--muted);z-index:1;
  animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* Card nav */
.card-nav{display:flex;align-items:center;justify-content:center;gap:1rem;
  margin:1.2rem auto 0;max-width:600px;padding:0 1rem}
.card-nav button{padding:.55rem 1.6rem;border-radius:30px;border:1px solid var(--gold-dark);
  background:transparent;color:var(--gold);font-family:'Crimson Pro',serif;
  font-size:1rem;cursor:pointer;transition:all .2s;letter-spacing:.04em}
.card-nav button:hover{background:var(--gold-dark);color:var(--gold-bright)}
.card-nav .counter{color:var(--muted);font-size:.9rem;min-width:80px;text-align:center}
.shuffle-btn{margin:0.8rem auto 0;display:block;background:transparent;
  border:1px solid rgba(201,168,76,.35);color:var(--muted);padding:5px 16px;
  border-radius:20px;font-family:'Crimson Pro',serif;font-size:.85rem;cursor:pointer;
  transition:all .2s}
.shuffle-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── Quiz panel ── */
#quiz-panel{padding:1.5rem 1rem 0;max-width:640px;margin:0 auto;display:none}
.quiz-status{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:1.2rem}
.q-stat{text-align:center}
.q-stat .val{font-family:'Playfair Display',serif;font-size:1.6rem;
  color:var(--gold-bright);line-height:1}
.q-stat .lbl{font-size:.75rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.quiz-q{background:linear-gradient(135deg,#1e3d28,#0c2010);border:1px solid var(--gold-dark);
  border-radius:14px;padding:1.5rem;margin-bottom:1rem;text-align:center}
.quiz-q .q-cat{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);margin-bottom:.5rem}
.quiz-q .q-term{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,2rem);
  color:var(--gold-bright);font-weight:700}
.quiz-q .q-illus{margin-top:1rem;min-height:60px;display:flex;
  align-items:center;justify-content:center}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.ans-btn{padding:.8rem 1rem;border-radius:10px;border:1px solid rgba(201,168,76,.3);
  background:rgba(255,255,255,.04);color:var(--text);font-family:'Crimson Pro',serif;
  font-size:.95rem;cursor:pointer;transition:all .2s;text-align:left;line-height:1.35}
.ans-btn:hover:not(:disabled){background:rgba(201,168,76,.12);border-color:var(--gold)}
.ans-btn.correct{background:rgba(46,204,113,.18);border-color:#27ae60;color:#a8f0c6}
.ans-btn.wrong{background:rgba(192,57,43,.18);border-color:#c0392b;color:#f0b8b0}
.ans-btn:disabled{cursor:default}
.quiz-next{display:none;margin:0 auto;padding:.65rem 2rem;
  background:var(--gold-dark);color:var(--gold-bright);border:none;border-radius:30px;
  font-family:'Crimson Pro',serif;font-size:1rem;cursor:pointer;
  transition:background .2s;letter-spacing:.04em}
.quiz-next:hover{background:var(--gold)}
.quiz-complete{text-align:center;padding:2rem}
.quiz-complete h2{font-family:'Playfair Display',serif;color:var(--gold-bright);
  font-size:2rem;margin-bottom:.5rem}
.quiz-complete p{color:var(--muted);margin-bottom:1.5rem}
.restart-btn{padding:.65rem 2rem;background:var(--gold-dark);color:var(--gold-bright);
  border:none;border-radius:30px;font-family:'Crimson Pro',serif;font-size:1rem;
  cursor:pointer;letter-spacing:.04em}

/* ── Reference panel ── */
#ref-panel{padding:1.2rem 1rem 0;max-width:900px;margin:0 auto;display:none}
.search-wrap{position:relative;margin-bottom:1.2rem}
.search-wrap input{width:100%;padding:.7rem 1rem .7rem 2.5rem;background:rgba(0,0,0,.3);
  border:1px solid var(--gold-dark);border-radius:30px;color:var(--text);
  font-family:'Crimson Pro',serif;font-size:1rem}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{outline:none;border-color:var(--gold)}
.search-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:1rem;pointer-events:none}
.ref-group{margin-bottom:1.5rem}
.ref-group-title{font-family:'Playfair Display',serif;color:var(--gold);
  font-size:1rem;letter-spacing:.08em;text-transform:uppercase;
  border-bottom:1px solid var(--gold-dark);padding-bottom:.3rem;margin-bottom:.6rem}
.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.ref-card{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);
  border-radius:10px;padding:.75rem 1rem;cursor:pointer;transition:all .2s}
.ref-card:hover{background:rgba(201,168,76,.08);border-color:var(--gold-dark)}
.ref-card .rc-term{font-weight:600;color:var(--gold-bright);margin-bottom:.25rem;
  font-size:1rem}
.ref-card .rc-def{font-size:.88rem;color:var(--muted);line-height:1.4}

/* ── Modal (ref detail) ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;
  display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:linear-gradient(135deg,#1e3d28,#0c2010);
  border:1px solid var(--gold);border-radius:16px;padding:1.5rem;
  max-width:480px;width:100%;position:relative}
.modal-close{position:absolute;top:.75rem;right:.75rem;background:transparent;
  border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}
.modal .mc{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.modal .mt{font-family:'Playfair Display',serif;font-size:1.8rem;
  color:var(--gold-bright);margin:.3rem 0 .8rem}
.modal .md{font-size:1.05rem;line-height:1.65;color:var(--text)}
.modal .mi{margin-top:1rem;display:flex;align-items:center;justify-content:center}

/* ── SVG cards ── */
.hand{display:flex;gap:6px;align-items:flex-end}
.playing-card{filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
</style>
</head>
<body>

<header>
  <div class="suits-row">
    <span class="s">♠</span>
    <span class="h">♥</span>
    <span class="d">♦</span>
    <span class="c">♣</span>
  </div>
  <h1><em>Texas Hold'em</em> Poker Trainer</h1>
  <p class="subtitle">Master the language of the felt</p>
  <nav>
    <button class="active" onclick="setMode('study')">Study</button>
    <button onclick="setMode('quiz')">Quiz</button>
    <button onclick="setMode('ref')">Reference</button>
  </nav>
</header>

<div class="filters" id="filters"></div>

<div class="progress-wrap" id="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-label"><span id="prog-text">Card 1 of 0</span><span id="prog-pct">0%</span></div>
</div>

<!-- STUDY MODE -->
<div id="study-panel">
  <div class="scene" onclick="flipCard()">
    <div class="card-wrap" id="card-wrap">
      <div class="card-back" id="card-back">
        <div class="back-pattern"></div>
        <div class="term-cat" id="cb-cat">Category</div>
        <div class="term-main" id="cb-term">Term</div>
        <div class="tap-hint">tap to reveal definition</div>
      </div>
      <div class="card-face" id="card-face">
        <div class="cf-header">
          <div class="cf-cat" id="cf-cat">Category</div>
          <div class="cf-term" id="cf-term">Term</div>
        </div>
        <div class="cf-body">
          <div class="cf-def" id="cf-def">Definition</div>
          <div class="illus" id="cf-illus"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="card-nav">
    <button onclick="navCard(-1)">← Prev</button>
    <span class="counter" id="counter">1 / 0</span>
    <button onclick="navCard(1)">Next →</button>
  </div>
  <button class="shuffle-btn" onclick="shuffle()">⇄ Shuffle deck</button>
</div>

<!-- QUIZ MODE -->
<div id="quiz-panel">
  <div class="quiz-status">
    <div class="q-stat"><div class="val" id="q-score">0</div><div class="lbl">Correct</div></div>
    <div class="q-stat"><div class="val" id="q-streak">0</div><div class="lbl">Streak</div></div>
    <div class="q-stat"><div class="val" id="q-total">0</div><div class="lbl">Answered</div></div>
    <div class="q-stat"><div class="val" id="q-pct">—</div><div class="lbl">Accuracy</div></div>
  </div>
  <div class="quiz-q" id="quiz-q">
    <div class="q-cat" id="q-cat"></div>
    <div class="q-term" id="q-term"></div>
    <div class="q-illus" id="q-illus"></div>
  </div>
  <div class="answers" id="answers"></div>
  <div style="text-align:center">
    <button class="quiz-next" id="quiz-next" onclick="nextQuiz()">Next Question →</button>
  </div>
</div>

<!-- REFERENCE MODE -->
<div id="ref-panel">
  <div class="search-wrap">
    <span class="search-icon">♠</span>
    <input type="text" id="search-inp" placeholder="Search terms…" oninput="renderRef()">
  </div>
  <div id="ref-content"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="mc" id="m-cat"></div>
    <div class="mt" id="m-term"></div>
    <div class="md" id="m-def"></div>
    <div class="mi" id="m-illus"></div>
  </div>
</div>

<script>
// ─────────────────── DATA ───────────────────
const TERMS = [
  // Hand Rankings
  {term:"Royal Flush",cat:"Hand Rankings",
   def:"The best possible hand: A-K-Q-J-10 all of the same suit. An unbeatable hand that occurs in roughly 1 in 650,000 deals.",
   illus:"royal-flush"},
  {term:"Straight Flush",cat:"Hand Rankings",
   def:"Five consecutive cards of the same suit (e.g., 7-8-9-10-J of hearts). Second only to a Royal Flush.",
   illus:"straight-flush"},
  {term:"Four of a Kind (Quads)",cat:"Hand Rankings",
   def:"Four cards of the same rank (e.g., 4♠ 4♥ 4♦ 4♣). Often an unbeatable hand in most situations.",
   illus:"quads"},
  {term:"Full House (Boat)",cat:"Hand Rankings",
   def:"Three of a kind combined with a pair (e.g., K-K-K-7-7). Named with the three-card rank first: 'Kings full of sevens.'",
   illus:"full-house"},
  {term:"Flush",cat:"Hand Rankings",
   def:"Five cards of the same suit, not in sequence. Ranked by the highest card. If two players have a flush, highest card wins.",
   illus:"flush"},
  {term:"Straight",cat:"Hand Rankings",
   def:"Five consecutive cards of mixed suits. Ace can be high (A-K-Q-J-10) or low (A-2-3-4-5, called a 'wheel').",
   illus:"straight"},
  {term:"Three of a Kind",cat:"Hand Rankings",
   def:"Three cards of the same rank plus two unrelated cards. Made in two ways: 'set' (pocket pair + one on board) or 'trips' (one in hand + two on board).",
   illus:"trips"},
  {term:"Two Pair",cat:"Hand Rankings",
   def:"Two different pairs plus one unrelated card. Ranked by the higher pair first, then the lower pair, then the kicker.",
   illus:"two-pair"},
  {term:"One Pair",cat:"Hand Rankings",
   def:"Two cards of the same rank plus three unrelated cards. The most common winning hand at showdown in many games.",
   illus:"pair"},
  {term:"High Card",cat:"Hand Rankings",
   def:"No combination is made; the hand is ranked by its highest card. The weakest hand category.",
   illus:"high-card"},

  // Positions
  {term:"Dealer Button (BTN)",cat:"Positions",
   def:"The most powerful position — acts last on every post-flop street. Rotates clockwise each hand to give all players equal positional access.",
   illus:"table-btn"},
  {term:"Cutoff (CO)",cat:"Positions",
   def:"One seat to the right of the Button — the second-best position. Often used to 'steal' the button by raising and isolating the blinds.",
   illus:"table-co"},
  {term:"Hijack (HJ)",cat:"Positions",
   def:"Two seats to the right of the Button. Nicknamed because players in this seat 'hijack' the stealing range of later positions.",
   illus:"table-hj"},
  {term:"Lojack (LJ)",cat:"Positions",
   def:"Three seats to the right of the Button in a 6+ player game. Also called Middle Position (MP).",
   illus:"table-lj"},
  {term:"Under the Gun (UTG)",cat:"Positions",
   def:"The first player to act pre-flop — the worst position. Sitting directly left of the Big Blind, forced to act before seeing how others react.",
   illus:"table-utg"},
  {term:"Small Blind (SB)",cat:"Positions",
   def:"Posts half the big blind before cards are dealt. Acts first post-flop in every street — the worst post-flop position.",
   illus:"table-sb"},
  {term:"Big Blind (BB)",cat:"Positions",
   def:"Posts the full forced bet before cards are dealt. Gets the last action pre-flop (after all others) giving the unique option to raise even if unopposed.",
   illus:"table-bb"},

  // Betting Actions
  {term:"Fold",cat:"Betting Actions",
   def:"Discard your hand and forfeit any claim to the pot. Cards go face-down into the muck. You lose any money already committed to the pot.",
   illus:"chips"},
  {term:"Check",cat:"Betting Actions",
   def:"Pass the action to the next player without betting. Only available when no bet has been made in the current street. Represented by a tap on the table.",
   illus:"chips"},
  {term:"Call",cat:"Betting Actions",
   def:"Match the current bet or raise to stay in the hand. Calling a raise is sometimes called 'flat-calling' — neither raising nor folding.",
   illus:"chips"},
  {term:"Bet",cat:"Betting Actions",
   def:"Voluntarily put chips in the pot as the first aggressor in a street. Opens the betting and forces opponents to call, raise, or fold.",
   illus:"chips"},
  {term:"Raise",cat:"Betting Actions",
   def:"Increase the size of the current bet. Forces all players who previously called to reconsider their decision. Minimum raise = size of the previous bet.",
   illus:"chips"},
  {term:"3-Bet",cat:"Betting Actions",
   def:"The third bet in a sequence: open (1st), raise (2nd), re-raise (3rd). In modern poker, often used as a bluff or for value with premium hands.",
   illus:"chips"},
  {term:"4-Bet",cat:"Betting Actions",
   def:"A re-raise of a 3-bet. Represents an extremely strong range. When someone 4-bets, they are declaring serious strength or making a sophisticated bluff.",
   illus:"chips"},
  {term:"All-In (Shove)",cat:"Betting Actions",
   def:"Commit all remaining chips to the pot. A player who is all-in can only win the portion of the pot they are eligible for — a side pot covers the rest.",
   illus:"chips"},
  {term:"Limp",cat:"Betting Actions",
   def:"Call the big blind pre-flop rather than raising. Generally considered a weak play in aggressive games as it fails to build the pot or gain information.",
   illus:"chips"},
  {term:"Straddle",cat:"Betting Actions",
   def:"An optional third blind post by UTG+1 (or another position), typically 2× the big blind. The straddler gains last action pre-flop in that round.",
   illus:"chips"},
  {term:"Open Raise",cat:"Betting Actions",
   def:"The first raise pre-flop, made when no one has yet entered the pot. The standard way to enter a hand in modern poker.",
   illus:"chips"},

  // Board & Cards
  {term:"Hole Cards (Pocket Cards)",cat:"Board & Cards",
   def:"The two private cards dealt face-down to each player at the start of a hand. Only visible to each player and at showdown.",
   illus:"hole-cards"},
  {term:"Community Cards",cat:"Board & Cards",
   def:"The five shared cards dealt face-up in the center of the table (flop, turn, river). All players use them to make the best 5-card hand.",
   illus:"board"},
  {term:"Flop",cat:"Board & Cards",
   def:"The first three community cards dealt simultaneously face-up. Represents 60% of the final board and dramatically changes hand values.",
   illus:"flop"},
  {term:"Turn",cat:"Board & Cards",
   def:"The fourth community card dealt face-up after a round of betting on the flop. Also called 'Fourth Street.' Narrows outs significantly.",
   illus:"turn"},
  {term:"River",cat:"Board & Cards",
   def:"The fifth and final community card. Also called 'Fifth Street.' The last chance to improve your hand and the final betting round before showdown.",
   illus:"river"},
  {term:"The Nuts",cat:"Board & Cards",
   def:"The best possible hand given the current board cards. 'Having the nuts' means you cannot be beaten by any opponent's holding.",
   illus:"nuts"},
  {term:"Backdoor / Runner-Runner",cat:"Board & Cards",
   def:"Needing both the turn and river to complete a draw (e.g., two running hearts for a flush). Also describes the completed hand: 'a runner-runner flush.'",
   illus:"board"},
  {term:"Pocket Pair",cat:"Board & Cards",
   def:"When your two hole cards are of the same rank (e.g., 8♠ 8♦). There are 78 possible pocket pairs in a 52-card deck.",
   illus:"hole-cards"},
  {term:"Suited",cat:"Board & Cards",

function getIllus(t) {
  if (t.illus && t.illus.startsWith('table-')) return tableIllus(t.illus);
  const fn = ILLUS[t.illus];
  return fn ? fn() : ILLUS['misc']();
}

// ─────────────────── FILTER CHIPS ───────────────────
function buildFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = `<button class="chip on" onclick="toggleCat('ALL')">All</button>` +
    CATS.map(c=>`<button class="chip on" id="chip-${c.replace(/\s/g,'_')}" onclick="toggleCat('${c}')">${c}</button>`).join('');
}

function toggleCat(cat) {
  if (cat==='ALL') {
    activeCats = new Set(CATS);
    document.querySelectorAll('.chip').forEach(c=>c.classList.add('on'));
  } else {
    const id = `chip-${cat.replace(/\s/g,'_')}`;
    const el = document.getElementById(id);
    if (activeCats.has(cat)) {
      if (activeCats.size===1) return;
      activeCats.delete(cat);
      el.classList.remove('on');
    } else {
      activeCats.add(cat);
      el.classList.add('on');
    }
    // All chip state
    const allChip = document.querySelector('.chip');
    allChip.classList.toggle('on', activeCats.size===CATS.length);
  }
  rebuildDeck();
}

// ─────────────────── DECK ───────────────────
function rebuildDeck() {
  deck = TERMS.filter(t=>activeCats.has(t.cat));
  idx = Math.min(idx, Math.max(0, deck.length-1));
  flipped = false;
  document.getElementById('card-wrap').classList.remove('flipped');
  renderCard();
  if (mode==='quiz') startQuiz();
  if (mode==='ref') renderRef();
}

function shuffle() {
  for (let i=deck.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
  idx=0;flipped=false;
  document.getElementById('card-wrap').classList.remove('flipped');
  renderCard();
}

// ─────────────────── STUDY ───────────────────
function renderCard() {
  if (!deck.length) return;
  const t = deck[idx];
  document.getElementById('cb-cat').textContent = t.cat;
  document.getElementById('cb-term').textContent = t.term;
  document.getElementById('cf-cat').textContent = t.cat;
  document.getElementById('cf-term').textContent = t.term;
  document.getElementById('cf-def').textContent = t.def;
  document.getElementById('cf-illus').innerHTML = getIllus(t);
  document.getElementById('counter').textContent = `${idx+1} / ${deck.length}`;
  document.getElementById('prog-text').textContent = `Card ${idx+1} of ${deck.length}`;
  const pct = Math.round((idx+1)/deck.length*100);
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('progress-fill').style.width = pct+'%';
}

function flipCard() {
  flipped=!flipped;
  document.getElementById('card-wrap').classList.toggle('flipped',flipped);
}

function navCard(dir) {
  flipped=false;
  document.getElementById('card-wrap').classList.remove('flipped');
  idx=(idx+dir+deck.length)%deck.length;
  renderCard();
}

// ─────────────────── QUIZ ───────────────────
let quizDeck=[], quizIdx=0, qScore=0, qStreak=0, qTotal=0;

function startQuiz() {
  quizDeck=[...deck].sort(()=>Math.random()-.5);
  quizIdx=0;qScore=0;qStreak=0;qTotal=0;
  document.getElementById('quiz-panel').innerHTML = `
    <div class="quiz-status">
      <div class="q-stat"><div class="val" id="q-score">0</div><div class="lbl">Correct</div></div>
      <div class="q-stat"><div class="val" id="q-streak">0</div><div class="lbl">Streak</div></div>
      <div class="q-stat"><div class="val" id="q-total">0</div><div class="lbl">Answered</div></div>
      <div class="q-stat"><div class="val" id="q-pct">—</div><div class="lbl">Accuracy</div></div>
    </div>
    <div class="quiz-q" id="quiz-q">
      <div class="q-cat" id="q-cat"></div>
      <div class="q-term" id="q-term"></div>
      <div class="q-illus" id="q-illus"></div>
    </div>
    <div class="answers" id="answers"></div>
    <div style="text-align:center">
      <button class="quiz-next" id="quiz-next" onclick="nextQuiz()">Next Question →</button>
    </div>`;
  showQuizQ();
}

function showQuizQ() {
  if (quizIdx>=quizDeck.length) { showQuizComplete(); return; }
  const t = quizDeck[quizIdx];
  document.getElementById('q-cat').textContent = t.cat;
  document.getElementById('q-term').textContent = t.term;
  document.getElementById('q-illus').innerHTML = getIllus(t);

  // 4 answer options (1 correct + 3 distractors from same or nearby cats)
  const wrong = TERMS.filter(x=>x.term!==t.term)
    .sort(()=>Math.random()-.5).slice(0,3);
  const opts = [...wrong,t].sort(()=>Math.random()-.5);

  document.getElementById('answers').innerHTML = opts.map(o=>
    `<button class="ans-btn" onclick="answerQuiz(this,'${o.term.replace(/'/g,"\\'")}','${t.term.replace(/'/g,"\\'")}')">
      <strong>${o.term}</strong><br>
      <span style="font-size:.82rem;color:#a09070">${o.def.slice(0,80)}…</span>
    </button>`
  ).join('');
  document.getElementById('quiz-next').style.display='none';
}

function answerQuiz(btn, chosen, correct) {
  const btns = document.querySelectorAll('.ans-btn');
  btns.forEach(b=>b.disabled=true);
  const isCorrect = chosen===correct;
  if (isCorrect) { btn.classList.add('correct'); qScore++; qStreak++; }
  else {
    btn.classList.add('wrong'); qStreak=0;
    btns.forEach(b=>{ if(b.textContent.trim().startsWith(correct)) b.classList.add('correct'); });
  }
  qTotal++;
  document.getElementById('q-score').textContent=qScore;
  document.getElementById('q-streak').textContent=qStreak;
  document.getElementById('q-total').textContent=qTotal;
  document.getElementById('q-pct').textContent=Math.round(qScore/qTotal*100)+'%';
  document.getElementById('quiz-next').style.display='inline-block';
}

function nextQuiz() {
  quizIdx++;
  showQuizQ();
}

function showQuizComplete() {
  const pct = Math.round(qScore/qTotal*100);
  const msg = pct>=90?'Phenomenal — table captain!':pct>=70?'Well played — solid fundamentals.':pct>=50?'Good start — keep grinding.':'Hit the study cards and come back!';
  document.getElementById('quiz-panel').innerHTML = `
    <div class="quiz-complete">
      <h2>${pct>=70?'🏆':'🃏'} Round Complete</h2>
      <p style="font-size:1.5rem;color:var(--gold-bright);margin:.5rem 0">${qScore} / ${qTotal} — ${pct}%</p>
      <p>${msg}</p>
      <button class="restart-btn" onclick="startQuiz()">Play Again</button>
    </div>`;
}

// ─────────────────── REFERENCE ───────────────────
function renderRef() {
  const q = document.getElementById('search-inp')?.value.toLowerCase()||'';
  const filtered = deck.filter(t=>!q||t.term.toLowerCase().includes(q)||t.def.toLowerCase().includes(q));
  const byCat = {};
  filtered.forEach(t=>{
    if (!byCat[t.cat]) byCat[t.cat]=[];
    byCat[t.cat].push(t);
  });
  document.getElementById('ref-content').innerHTML = Object.entries(byCat).map(([cat,ts])=>
    `<div class="ref-group">
      <div class="ref-group-title">${cat}</div>
      <div class="ref-grid">
        ${ts.map(t=>`
          <div class="ref-card" onclick="openModal('${t.term.replace(/'/g,"\\'")}')">
            <div class="rc-term">${t.term}</div>
            <div class="rc-def">${t.def.slice(0,90)}${t.def.length>90?'…':''}</div>
          </div>`).join('')}
      </div>
    </div>`
  ).join('')||'<p style="color:var(--muted);text-align:center;padding:2rem">No terms match your search.</p>';
}

// ─────────────────── MODAL ───────────────────
function openModal(termName) {
  const t = TERMS.find(x=>x.term===termName);
  if (!t) return;
  document.getElementById('m-cat').textContent=t.cat;
  document.getElementById('m-term').textContent=t.term;
  document.getElementById('m-def').textContent=t.def;
  document.getElementById('m-illus').innerHTML=getIllus(t);
  document.getElementById('modal').classList.add('open');
}
function closeModal(e) {
  if (!e||e.target===document.getElementById('modal')||e.currentTarget.tagName==='BUTTON')
    document.getElementById('modal').classList.remove('open');
}

// ─────────────────── MODE SWITCH ───────────────────
function setMode(m) {
  mode=m;
  ['study','quiz','ref'].forEach(x=>{
    document.getElementById(`${x}-panel`).style.display= x===m?'block':'none';
  });
  document.querySelectorAll('nav button').forEach((b,i)=>{
    b.classList.toggle('active',['study','quiz','ref'][i]===m);
  });
  const showProgress = m==='study';
  document.getElementById('progress-wrap').style.display=showProgress?'block':'none';
  document.getElementById('filters').style.display='flex';
  if (m==='quiz') startQuiz();
  if (m==='ref') renderRef();
}

// ─────────────────── INIT ───────────────────
buildFilters();
rebuildDeck();
document.getElementById('progress-wrap').style.display='block';
</script>
</body>
</html>
